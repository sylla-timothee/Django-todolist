{% extends 'todo/main.html' %}
{% block content %}

<div class="bg-gradient-to-r from-[#FF7E5F] to-[#FEB47B] p-6 text-white">
    <h1 class="text-xl font-semibold">Gestion de la tâche</h1>
    <a href="{% url 'tasks' %}" class="text-xs text-[#FDFBF7] hover:underline">← Retour à la liste</a>
</div>

<form method="POST" action="" class="p-6 space-y-6 bg-white">
    {% csrf_token %}
    
    <div class="space-y-4 text-gray-700">
        {% for field in form %}
            <div class="flex flex-col gap-1">
                <label class="text-sm font-medium text-gray-600">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-xs text-red-500">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
    </div>

    <button type="submit" class="w-full bg-[#FF7E5F] hover:bg-[#ED6A4C] text-white font-medium py-3 rounded-xl transition shadow-md shadow-[#FF7E5F]/20">
        Confirmer et enregistrer
    </button>
</form>

<style>
    input[type="text"] {
        width: 100%; padding: 0.75rem; border: 1px solid #EDE6D4; border-radius: 0.75rem; background-color: #FDFBF7; outline: none; transition: all 0.2s;
    }
    input[type="text"]:focus {
        border-color: #FF7E5F; box-shadow: 0 0 0 3px rgba(255, 126, 95, 0.1);
    }
    input[type="checkbox"] {
        width: 1.2rem; height: 1.2rem; accent-color: #FF7E5F; cursor: pointer;
    }
</style>

{% endblock content %}
