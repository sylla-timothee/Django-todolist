<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Supprimer</title></head>
<body>
    <h1>Supprimer la tâche</h1>
    <p>Êtes-vous sûr de vouloir supprimer la tâche : "<strong>{{ task.title }}</strong>" ?</p>
    <form method="POST">
        {% csrf_token %}
        <input type="submit" value="Confirmer la suppression">
        <a href="{% url 'tasks' %}">Annuler</a>
    </form>
</body>
</html>
