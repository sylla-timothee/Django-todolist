{% extends 'todo/main.html' %}
{% block content %}

<div class="bg-gradient-to-r from-[#FF7E5F] to-[#FEB47B] p-6 text-white">
    <h1 class="text-xl font-semibold">Mettre à jour l'avatar</h1>
    <a href="{% url 'tasks' %}" class="text-xs text-[#FDFBF7] hover:underline">← Annuler et revenir</a>
</div>

<div class="p-8 bg-white flex flex-col items-center text-center">
    <div class="mb-6">
        <p class="text-xs text-gray-400 mb-2">Avatar actuel</p>
        <img src="{{ request.user.profile.avatar.url }}" alt="Avatar actuel" class="w-24 h-24 rounded-full object-cover border-4 border-[#FEB47B] shadow-md">
    </div>

    <form method="POST" enctype="multipart/form-data" class="w-full space-y-6">
        {% csrf_token %}
        
        <div class="bg-[#FDFBF7] p-4 rounded-xl border border-[#EDE6D4] text-sm text-gray-600">
            {{ form.as_p }}
        </div>

        <button type="submit" class="w-full bg-[#FF7E5F] hover:bg-[#ED6A4C] text-white font-medium py-3 rounded-xl transition shadow-md shadow-[#FF7E5F]/20">
            Sauvegarder la nouvelle image
        </button>
    </form>
</div>

<style>
    input[type="file"] {
        font-size: 0.85rem; color: #4B5563;
    }
</style>

{% endblock content %}
