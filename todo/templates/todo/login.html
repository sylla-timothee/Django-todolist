{% extends 'todo/main.html' %}
{% block content %}

<div class="bg-gradient-to-r from-[#FF7E5F] to-[#FEB47B] p-8 text-white text-center">
    <h1 class="text-2xl font-semibold tracking-wide">Stark Todo-List</h1>
    <p class="text-xs opacity-90 mt-1 text-[#FDFBF7]">Connectez-vous pour accéder à vos protocoles</p>
</div>

<form method="POST" action="" class="p-8 space-y-6 bg-white">
    {% csrf_token %}
    
    <div class="space-y-4">
        {% for field in form %}
            <div class="flex flex-col gap-1">
                <label class="text-sm font-medium text-gray-600">{{ field.label }}</label>
                {{ field }}
            </div>
        {% endfor %}
    </div>

    <button type="submit" class="w-full bg-[#FF7E5F] hover:bg-[#ED6A4C] text-white font-medium py-3 rounded-xl transition shadow-lg shadow-[#FF7E5F]/20">
        Se connecter
    </button>

    <p class="text-center text-sm text-gray-500 mt-4">
        Nouveau sur le système ? 
        <a href="{% url 'register' %}" class="text-amber-600 hover:underline font-medium">Créer un compte</a>
    </p>
</form>

<style>
    input[type="text"], input[type="password"] {
        width: 100%; padding: 0.75rem; border: 1px solid #EDE6D4; border-radius: 0.75rem; background-color: #FDFBF7; outline: none;
    }
    input[type="text"]:focus, input[type="password"]:focus { border-color: #FF7E5F; }
</style>

{% endblock content %}
